<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f1f5f9;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.header i{
    color:#2563eb;
}

/* SEARCH BOX */
.search-container{
    padding:12px;
}

.search-box{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:14px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.search-box i{
    color:#64748b;
    margin-right:10px;
}

.search-box input{
    border:none;
    outline:none;
    font-size:16px;
    width:100%;
    background:transparent;
}

/* LIST */
.list{
    padding:10px;
}

.item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff;
    margin-bottom:12px;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
    box-shadow:0 4px 15px rgba(0,0,0,0.06);
    transition:.2s;
    position:relative;
    overflow:hidden;
}

.item:hover{
    transform:scale(1.02);
}

/* ICON LEFT */
.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.left i{
    color:#2563eb;
    font-size:18px;
}

/* RIGHT ICON */
.right i{
    color:#999;
}

/* RIPPLE EFFECT */
.item:active::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.05);
    top:0;
    left:0;
}

/* EMPTY */
.empty{
    text-align:center;
    color:#888;
    margin-top:40px;
}

/* LOADING */
#loading{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(6px);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader{
    border:5px solid #ddd;
    border-top:5px solid #2563eb;
    border-radius:50%;
    width:50px;
    height:50px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="header">
    <i class="fa-solid fa-magnifying-glass"></i>
    Search
</div>

<div class="search-container">
    <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="search" placeholder="Search here...">
    </div>
</div>

<div class="list" id="list"></div>

<div id="loading">
    <div class="loader"></div>
</div>

<script>

const data = [
    {name: "Result", link: "result.html", icon:"fa-file-lines"},
    {name: "Notice", link: "notice.html", icon:"fa-bell"},
    {name: "Class Notice", link: "notice.html", icon:"fa-chalkboard"},
    {name: "Message", link: "teacher_notice.html", icon:"fa-envelope"},
    {name: "Gallery", link: "post.html", icon:"fa-image"},
    {name: "Post", link: "post.html", icon:"fa-pen"},
    {name: "Contact", link: "phone.html", icon:"fa-phone"},
    {name: "Teacher Message", link: "teacher_notice.html", icon:"fa-user"}
];

const list = document.getElementById("list");
let debounceTimer;

function showData(arr){

    list.innerHTML = "";

    if(arr.length === 0){
        list.innerHTML = `<div class="empty">No result found</div>`;
        return;
    }

    arr.forEach(item=>{
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="left">
                <i class="fa-solid ${item.icon}"></i>
                <span>${item.name}</span>
            </div>
            <div class="right">
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        `;

        div.onclick = ()=>{
            document.getElementById("loading").style.display = "flex";

            setTimeout(()=>{
                window.location.href = item.link;
            },1200);
        }

        list.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", function(){

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(()=>{
        let value = this.value.toLowerCase();

        if(value === ""){
            list.innerHTML = `<div class="empty">Start typing to search</div>`;
            return;
        }

        let filtered = data.filter(item =>
            item.name.toLowerCase().includes(value)
        );

        showData(filtered);

    },200);
});

list.innerHTML = `<div class="empty">Start typing to search</div>`;

</script>

</body>
</html>
