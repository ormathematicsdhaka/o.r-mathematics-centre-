<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School App</title>

<!-- FIXED FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f4fa;
    padding-bottom:90px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
    display:flex;
    align-items:center;
}

.logo img{
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:10px;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.user{
    font-size:22px;
    cursor:pointer;
}

/* SLIDER */
.slider{
    height:200px;
    overflow:hidden;
    position:relative;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    left:100%;
    transition:1s;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:12px;
}

.grid button{
    background:white;
    border:none;
    border-radius:12px;
    height:85px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:13px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.grid i{
    font-size:22px;
    color:#0077ff;
    margin-bottom:5px;
}

/* RIPPLE */
.grid button:active::after{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(0,0,0,0.1);
    border-radius:50%;
    animation:ripple .6s;
}

@keyframes ripple{
    from{transform:scale(0);opacity:1;}
    to{transform:scale(3);opacity:0;}
}

/* NOTICE */
.notice{
    background:white;
    margin:12px;
    padding:12px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.notice-item{
    padding:8px 0;
    border-bottom:1px solid #eee;
    cursor:pointer;
    font-size:14px;
}

/* NEW TAG */
.new{
    background:red;
    color:white;
    font-size:11px;
    padding:2px 6px;
    border-radius:5px;
    margin-left:6px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:.3;}
    100%{opacity:1;}
}

/* ADS */
.adslider{
    width:92%;
    height:140px;
    margin:20px auto;
    overflow:hidden;
    position:relative;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.ad{
    position:absolute;
    width:100%;
    height:100%;
    left:100%;
    transition:1s;
}

.ad img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MARQUEE */
.mtext{
    background:#0a6cff;
    color:white;
    padding:10px;
    font-size:14px;
}

/* FEATURES */
.features{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    text-align:center;
}

/* BOTTOM */
.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    box-shadow:0 -4px 20px rgba(0,0,0,0.15);
}

.bottom div{
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

.bottom i{
    font-size:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="logo.png">
        <div class="name">O.R MATHEMATICS CENTRE</div>
    </div>
    <div class="user" onclick="openPage('notice.html')">
        <i class="fa-solid fa-bell"></i>
    </div>
</div>

<!-- SLIDER -->
<div class="slider">
    <div class="slide"><img src="1.png"></div>
    <div class="slide"><img src="2.png"></div>
    <div class="slide"><img src="3.png"></div>
    <div class="slide"><img src="4.png"></div>
    <div class="slide"><img src="5.png"></div>
    <div class="slide"><img src="6.png"></div>
</div>

<!-- BUTTON -->
<div class="grid">
<button onclick="openPage('not_page.html')"><i class="fa-solid fa-school"></i> Fee Check</button>
<button onclick="openPage('result.html')"><i class="fa-solid fa-graduation-cap"></i> Result</button>
<button onclick="openPage('post.html')"><i class="fa-solid fa-image"></i> Gallery</button>
<button onclick="openPage('phone.html')"><i class="fa-solid fa-phone"></i> Contact</button>
</div>

<!-- NOTICE -->
<div class="notice">
<h3>📢 Notice Board</h3>

<div class="notice-item" onclick="openPage('result.html')">
👉 Test Exam Result <span class="new">NEW</span>
</div>

<div class="notice-item" onclick="openPage('teacher_notice.html')">
👉 Teacher Message Importent<span class="new"></span>
</div>

<div class="notice-item" onclick="openPage('notice.html')">👉 Cless     Messages / (Notice)</div>


</div>

<!-- ADS -->
<div class="adslider">
    <div class="ad"><img src="1.png"></div>
    <div class="ad"><img src="2.png"></div>
</div>

<!-- MARQUEE -->
<div class="mtext">
<marquee>🌍 👉 O.R Mathematics Centre, App Lunch New App This Is Life technology my tuition is O.R Mathematics Centre</marquee>
</div>

<!-- FEATURES -->
<div class="features">
<div class="card"><i class="fa-solid fa-book"></i><br>बच्चा का पढ़ाई !</div>
<div class="card"><i class="fa-solid fa-user-graduate"></i><br>अब App पर आई !</div>
</div>

<!-- BOTTOM -->
<div class="bottom">
<div onclick="openPage('home.html')"><i class="fa-solid fa-house"></i><br>Home</div>
<div onclick="openPage('search.html')"><i class="fa-solid fa-search"></i><br>Search</div>
<div onclick="openPage('post.html')"><i class="fa-solid fa-plus"></i><br>Post</div>
<div onclick="openPage('notice.html')"><i class="fa-solid fa-bell"></i><br>Notice</div>
</div>

<script>

/* PAGE OPEN */
function openPage(page){
    window.location.href = page;
}

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let i = 0;

function slider(){
    slides.forEach(s => s.style.left = "100%");
    slides[i].style.left = "0";
    i++;
    if(i === slides.length){ i = 0; }
}
slider();
setInterval(slider, 4000);

/* ADS */
let ads = document.querySelectorAll(".ad");
let j = 0;

function adslider(){
    ads.forEach(a => a.style.left = "100%");
    ads[j].style.left = "0";
    j++;
    if(j === ads.length){ j = 0; }
}
adslider();
setInterval(adslider, 3500);

</script>

</body>
</html>
