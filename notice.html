<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notice App</title>

<!-- Real Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f5f7fb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* App Card */
.app{
    width:95%;
    max-width:420px;
    background:#fff;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
    padding:30px 20px;
}

/* Title */
.title{
    text-align:center;
    font-size:22px;
    font-weight:600;
    margin-bottom:25px;
    color:#222;
}

/* Button Container */
.container{
    display:flex;
    gap:20px;
    justify-content:center;
}

/* Square Buttons */
.box{
    width:130px;
    height:130px;
    background:#fff;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.06);
}

.box:hover{
    transform: translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* Icons */
.icon{
    font-size:35px;
    margin-bottom:10px;
    color:#000000;
}

/* Text */
.text{
    font-size:14px;
    color:#444;
}

/* Blur */
.blur{
    filter: blur(5px);
}

/* Loader */
.loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(6px);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader.active{
    opacity:1;
    pointer-events:all;
}

/* Spinner */
.spinner{
    width:45px;
    height:45px;
    border:4px solid #ddd;
    border-top:4px solid #4f46e5;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

</style>
</head>

<body>

<div id="main" class="app">

    <div class="title">Notice Board</div>

    <div class="container">

        <div class="box" onclick="openPage('class_notice.html')">
            <div class="icon"><i class="fas fa-book"></i></div>
            <div class="text">Class Notice</div>
        </div>

        <div class="box" onclick="openPage('teacher_notice.html')">
            <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
            <div class="text">Office Notice</div>
        </div>

    </div>

</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>

function openPage(page){
    document.getElementById("loader").classList.add("active");
    document.getElementById("main").classList.add("blur");

    setTimeout(()=>{
        window.location.href = page;
    },1200);
}

</script>

</body>
</html>
