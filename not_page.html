<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#eef2ff,#f9fbff);
    text-align:center;
}

/* LOGO */
.logo{
    width:90px;
    height:90px;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation:zoom 2s infinite alternate;
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

/* TEXT */
.title{
    font-size:24px;
    font-weight:bold;
    color:#222;
}

.sub{
    font-size:14px;
    color:#666;
    margin-top:5px;
}

/* LOADING DOTS */
.dots{
    margin-top:15px;
    font-size:16px;
    color:#0077ff;
    letter-spacing:3px;
}

.dots span{
    animation:blink 1.5s infinite;
}

.dots span:nth-child(2){animation-delay:.3s;}
.dots span:nth-child(3){animation-delay:.6s;}

@keyframes blink{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#0077ff;
    color:white;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="title">Pages Comming Soon</div>
<div class="sub">Feature under development</div>

<div class="dots">
    <span>O</span>
    <span>.</span>
    <span>R</span>
</div>

<button class="btn" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i> Go Back
</button>

<script>

function goBack(){
    window.history.back();
}

</script>

</body>
</html>
